[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    live_llm: marks tests that require real Ollama inference (skip unless INTEGRATION_LIVE_LLM=1)
    requires_workers: marks tests that require running Celery workers
    benchmark: marks diagnostic accuracy benchmark tests (stub mode ~50s, live mode ~25-90 min)
