name: Deploy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: prod
        type: choice
        options: [prod]

concurrency:
  group: gcp-deploy-${{ github.ref }}
  cancel-in-progress: false  # never cancel a running deploy

# ── Required repository variables (Settings → Variables) ─────────────────────
# GCP_PROJECT_ID   — GCP project ID
# GCP_REGION       — us-central1
# GCP_ZONE         — us-central1-a
# GCP_ENV          — prod
# WIF_PROVIDER     — projects/.../locations/global/workloadIdentityPools/.../providers/...
# DEPLOY_SA        — forensic-flight-prod-deploy@PROJECT.iam.gserviceaccount.com
# VM_NAME          — forensic-flight-prod-worker
#
# Get WIF_PROVIDER and DEPLOY_SA from: terraform output wif_provider / deploy_sa_email

jobs:
  # ── 0. CI gate ──────────────────────────────────────────────────────────────
  ci-gate:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # ── 1. Build & push all images to Artifact Registry ─────────────────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: ci-gate

    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      api_url:   ${{ steps.api-url.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account:            ${{ vars.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image tag (short SHA)
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Get API URL from Cloud Run (for VITE_API_URL bake-in)
        id: api-url
        run: |
          URL=$(gcloud run services describe \
                  forensic-flight-${{ vars.GCP_ENV }}-api \
                  --region ${{ vars.GCP_REGION }} \
                  --format "value(status.url)" 2>/dev/null || echo "")
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "API URL: $URL"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file:    docker/Dockerfile.api
          push:    true
          tags: |
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/forensic-flight/api:${{ steps.meta.outputs.tag }}
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/forensic-flight/api:latest
          cache-from: type=gha,scope=api
          cache-to:   type=gha,scope=api,mode=max
          provenance: false

      - name: Build & push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file:    docker/Dockerfile.worker
          push:    true
          tags: |
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/forensic-flight/worker:${{ steps.meta.outputs.tag }}
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/forensic-flight/worker:latest
          cache-from: type=gha,scope=worker
          cache-to:   type=gha,scope=worker,mode=max
          provenance: false

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file:    docker/Dockerfile.frontend
          push:    true
          tags: |
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/forensic-flight/frontend:${{ steps.meta.outputs.tag }}
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/forensic-flight/frontend:latest
          build-args: |
            VITE_API_URL=${{ steps.api-url.outputs.url }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max
          provenance: false

  # ── 2. Deploy Cloud Run services (API + frontend) ───────────────────────────
  deploy-cloudrun:
    name: Deploy Cloud Run
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account:            ${{ vars.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API to Cloud Run
        run: |
          gcloud run services update \
            forensic-flight-${{ vars.GCP_ENV }}-api \
            --image "${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/forensic-flight/api:${{ needs.build.outputs.image_tag }}" \
            --region ${{ vars.GCP_REGION }}

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run services update \
            forensic-flight-${{ vars.GCP_ENV }}-frontend \
            --image "${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/forensic-flight/frontend:${{ needs.build.outputs.image_tag }}" \
            --region ${{ vars.GCP_REGION }}

      - name: Wait for API revision to serve traffic
        run: |
          for i in $(seq 1 20); do
            SERVING=$(gcloud run revisions list \
              --service forensic-flight-${{ vars.GCP_ENV }}-api \
              --region ${{ vars.GCP_REGION }} \
              --format "value(status.conditions[0].status)" \
              --limit 1 2>/dev/null || echo "")
            [ "$SERVING" = "True" ] && echo "API revision is serving" && break
            echo "Waiting for revision to be ready ($i/20)..."
            sleep 10
          done

      - name: API health check
        run: |
          API_URL="${{ needs.build.outputs.api_url }}"
          if [ -z "$API_URL" ]; then
            API_URL=$(gcloud run services describe \
              forensic-flight-${{ vars.GCP_ENV }}-api \
              --region ${{ vars.GCP_REGION }} \
              --format "value(status.url)")
          fi
          echo "Checking $API_URL/health"
          for i in $(seq 1 8); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$API_URL/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 8 attempts"
          exit 1

  # ── 3. Deploy VM workers ────────────────────────────────────────────────────
  deploy-vm:
    name: Deploy VM workers
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account:            ${{ vars.DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Write deployed image tag to VM metadata
        # Startup script reads this on every boot — ensures reboots self-heal to the correct tag.
        run: |
          gcloud compute instances add-metadata ${{ vars.VM_NAME }} \
            --zone ${{ vars.GCP_ZONE }} \
            --metadata "worker-image-tag=${{ needs.build.outputs.image_tag }}"

      - name: Re-run startup script on VM (live deploy without reboot)
        # google_metadata_script_runner re-executes the startup script:
        #   - reads updated IMAGE_TAG from metadata
        #   - regenerates docker-compose.yml with new image tag
        #   - `systemctl restart forensic-flight` pulls and restarts workers only
        run: |
          gcloud compute ssh ${{ vars.VM_NAME }} \
            --zone ${{ vars.GCP_ZONE }} \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag="-o StrictHostKeyChecking=accept-new" \
            --ssh-flag="-o ConnectTimeout=30" \
            -- "sudo google_metadata_script_runner startup 2>&1 | tail -30"

      - name: Verify workers are running
        run: |
          gcloud compute ssh ${{ vars.VM_NAME }} \
            --zone ${{ vars.GCP_ZONE }} \
            --tunnel-through-iap \
            --quiet \
            --ssh-flag="-o StrictHostKeyChecking=accept-new" \
            -- "cd /opt/forensic-flight && sudo docker compose ps --format 'table {{.Name}}\t{{.Status}}'"
